<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="MarcFBe-Icon.png">
    <title>Whoami - MarcF.Be</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;600;700&family=Righteous&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="header-row">
        <img src="MarcFBe-Logo.png" alt="MarcF.Be Logo" class="logo">
        <img src="MarcFBe-Avatar.png" alt="MarcF.Be Avatar" class="avatar">
    </div>
    <div class="container">
        <h2>Whoami</h2>
        <div class="ip-section">
            <div class="ip-label">IPv4 Address</div>
            <div class="ip-wrapper">
                <div class="ip-value-container">
                    <div class="ip-value loading" id="ipv4">Loading...</div>
                </div>
                <button class="copy-btn" onclick="copyToClipboard('ipv4', this)" title="Copy IPv4">Copy</button>
            </div>
        </div>
        <div class="ip-section">
            <div class="ip-label">IPv6 Address</div>
            <div class="ip-wrapper">
                <div class="ip-value-container">
                    <div class="ip-value loading" id="ipv6">Loading...</div>
                </div>
                <button class="copy-btn" onclick="copyToClipboard('ipv6', this)" title="Copy IPv6">Copy</button>
            </div>
        </div>
        <button class="refresh-btn" id="refreshBtn" onclick="fetchIPs()">Refresh</button>
    </div>

    <script>
        async function fetchIPv4() {
            try {
                const response = await fetch('https://api.ipify.org?format=json');
                const data = await response.json();
                return data.ip;
            } catch (error) {
                console.error('Error fetching IPv4:', error);
                throw error;
            }
        }

        async function fetchIPv6() {
            try {
                const response = await fetch('https://api64.ipify.org?format=json');
                const data = await response.json();
                return data.ip;
            } catch (error) {
                console.error('Error fetching IPv6:', error);
                throw error;
            }
        }

        async function fetchIPs() {
            const ipv4Element = document.getElementById('ipv4');
            const ipv6Element = document.getElementById('ipv6');
            const refreshBtn = document.getElementById('refreshBtn');

            refreshBtn.disabled = true;
            refreshBtn.textContent = 'Refreshing...';

            ipv4Element.textContent = 'Loading...';
            ipv4Element.className = 'ip-value loading';
            ipv6Element.textContent = 'Loading...';
            ipv6Element.className = 'ip-value loading';

            try {
                const [ipv4, ipv6] = await Promise.all([fetchIPv4(), fetchIPv6()]);

                ipv4Element.textContent = ipv4 || 'Not available';
                ipv4Element.className = 'ip-value';

                ipv6Element.textContent = ipv6 || 'Not available';
                ipv6Element.className = 'ip-value';
            } catch (error) {
                ipv4Element.textContent = 'Error fetching IPv4';
                ipv4Element.className = 'ip-value error';
                ipv6Element.textContent = 'Error fetching IPv6';
                ipv6Element.className = 'ip-value error';
            } finally {
                refreshBtn.disabled = false;
                refreshBtn.textContent = 'Refresh';
            }
        }

        function copyToClipboard(type, button) {
            const element = document.getElementById(type);
            const text = element.textContent;

            if (text === 'Loading...' || text.includes('Error') || text === 'Not available') {
                return;
            }

            navigator.clipboard.writeText(text).then(() => {
                const originalText = button.textContent;
                button.textContent = 'Copied!';
                button.style.background = '#0044CC';
                setTimeout(() => {
                    button.textContent = originalText;
                    button.style.background = 'linear-gradient(135deg, #808080 0%, #000000 100%)';
                }, 2000);
            }).catch(err => {
                console.error('Failed to copy:', err);
            });
        }

        fetchIPs();
    </script>
</body>
</html>
